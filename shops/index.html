---
layout: default
title: 推しグルメ聖地MAP｜お店を探す
description: よにのちゃんねる・Snow Man・SixTONESなどアイドル・芸人・YouTuberが実際に訪れた695件のグルメスポットを地図と一覧で探せます。グループ・ジャンル・エリアで絞り込み対応。
---

<!-- コンパクトフィルターバー -->
<div class="fbar" id="fbar">
  <div class="container fbar__row">
    <div class="fbar__group-dots" id="fbar-group-dots"></div>
    <p class="fbar__summary" id="fbar-summary">全グループ表示中</p>
    <button class="fbar__btn fbar__btn--change" id="group-modal-open">推し ▾</button>
    <button class="fbar__btn" id="area-modal-open">📍 エリア</button>
  </div>
  <!-- 検索パネル（常時表示） -->
  <div class="fbar__search-panel" id="fbar-search-panel">
    <div class="container">
      <div class="fbar__search-wrap">
        <input type="text" id="search-input" class="fbar__search-input" placeholder="お店名・住所・メンバー名で検索...">
        <button class="fbar__search-clear" id="search-clear" aria-label="検索をクリア" hidden>✕</button>
      </div>
    </div>
  </div>
  <!-- 選択中チップ -->
  <div class="fbar__chips-row" id="fbar-chips-row" style="display:none">
    <div class="container">
      <div class="fbar__chips" id="fbar-chips"></div>
    </div>
  </div>
</div>

<!-- グループ選択モーダル -->
<div class="fmodal-overlay" id="group-modal-overlay" aria-hidden="true">
  <div class="fmodal fmodal--group" role="dialog" aria-modal="true" aria-label="推しから絞り込む">
    <div class="fmodal__header">
      <h2 class="fmodal__title">推しから絞り込む</h2>
      <button class="fmodal__close" id="group-modal-close" aria-label="閉じる">✕</button>
    </div>
    <div class="fmodal__search-row">
      <input type="text" id="group-search-input" class="fmodal__search-input" placeholder="グループ名を検索...">
    </div>
    <div class="fmodal__body">
      <ul class="group-check-list" id="group-check-list"></ul>
    </div>
    <div class="fmodal__footer">
      <button class="fmodal__reset-btn" id="group-modal-reset">リセット</button>
      <button class="fmodal__apply-btn" id="group-modal-apply">絞り込む →</button>
    </div>
  </div>
</div>

<!-- エリア選択モーダル -->
<div class="fmodal-overlay" id="area-modal-overlay" aria-hidden="true">
  <div class="fmodal fmodal--area" role="dialog" aria-modal="true" aria-label="エリアから絞り込む">
    <div class="fmodal__header">
      <h2 class="fmodal__title">エリアから絞り込む</h2>
      <button class="fmodal__close" id="area-modal-close" aria-label="閉じる">✕</button>
    </div>
    <div class="fmodal__body area-body-pc" id="area-modal-pc"></div>
    <div class="fmodal__body area-body-sp" id="area-modal-sp">
      <div class="area-sidebar" id="area-sidebar"></div>
      <div class="area-prefs" id="area-prefs"></div>
    </div>
    <div class="fmodal__footer">
      <button class="fmodal__reset-btn" id="area-modal-reset">リセット</button>
      <button class="fmodal__apply-btn" id="area-modal-apply">このエリアで絞り込む →</button>
    </div>
  </div>
</div>

<!-- hidden: ジャンルフィルター（URLパラメーター対応） -->
<div style="display:none">
  <select id="filter-genre"><option value=""></option></select>
</div>

<!-- 件数 + タブ + ソート -->
<div class="container">
  <div class="shop-controls-bar">
    <p class="result-count" id="result-count"></p>
    <div class="shop-controls-right">
      <select id="sort-select" class="filter-select filter-select--sort">
        <option value="recent">新着順 ▾</option>
        <option value="video">動画あり順</option>
      </select>
      <div class="view-tabs">
        <button class="tab-btn active" data-view="grid">写真</button>
        <button class="tab-btn" data-view="map">地図</button>
      </div>
    </div>
  </div>
</div>

<!-- ジャンルピル -->
<div class="genre-pills-bar">
  <div class="container">
    <div class="genre-pills" id="genre-pills"></div>
  </div>
</div>

<!-- カードグリッド -->
<div id="shop-list-wrap">
  <div class="container">
    <div class="shop-cards" id="shop-grid">
      <p class="loading">読み込み中...</p>
    </div>
  </div>
</div>

<!-- 地図 -->
<section class="map-section" id="view-map" style="display:none">
  <div id="map"></div>
</section>
