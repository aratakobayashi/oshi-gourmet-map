---
layout: default
title: 推しグルメ聖地MAP｜お店を探す
description: よにのちゃんねる・Snow Man・SixTONESなどアイドル・芸人・YouTuberが実際に訪れた468件のグルメスポットを地図と一覧で探せます。グループ・ジャンル・エリアで絞り込み対応。
---

<div class="shops-page-header container">
  <h1 class="shops-page-title">お店を探す</h1>
</div>

<!-- 検索・フィルターバー -->
<section class="filter-bar">
  <div class="container">
    <div id="group-filter-row" class="group-filter__row"></div>
    <div class="filter-bar__row">
      <input type="text" id="search-input" class="filter-input" placeholder="お店名・エリアで検索...">
      <select id="filter-genre" class="filter-select">
        <option value="">すべてのジャンル</option>
      </select>
      <select id="filter-prefecture" class="filter-select">
        <option value="">すべての都道府県</option>
      </select>
      <button id="reset-filters" class="btn btn--reset">リセット</button>
    </div>
  </div>
</section>

<!-- カウンター + タブ -->
<div class="container">
  <div class="shop-controls-bar">
    <p class="result-count" id="result-count"></p>
    <div class="view-tabs">
      <button class="tab-btn active" data-view="grid">リスト表示</button>
      <button class="tab-btn" data-view="map">地図表示</button>
    </div>
  </div>
</div>

<!-- マスター・ディテール レイアウト -->
<div class="shop-master-detail container" id="shop-list-wrap">

  <!-- 左：店舗リスト -->
  <div class="shop-list-col" id="view-grid">
    <div class="shop-list" id="shop-grid">
      <p class="loading">読み込み中...</p>
    </div>
  </div>

  <!-- 右：詳細パネル（PC専用） -->
  <aside class="shop-detail-col" id="shop-panel" aria-label="店舗詳細">
    <div class="shop-detail-placeholder" id="shop-detail-placeholder">
      <div class="shop-detail-placeholder__icon">🍽️</div>
      <p class="shop-detail-placeholder__title">お店を選んでください</p>
      <p class="shop-detail-placeholder__sub">左のリストからお店をクリックすると<br>詳細が表示されます</p>
    </div>
    <div id="shop-panel-content" style="display:none"></div>
  </aside>

</div>

<!-- 地図 -->
<section class="map-section" id="view-map" style="display:none;">
  <div id="map"></div>
</section>

<script>
  const SITE_BASEURL = '{{ site.baseurl }}';
</script>
